name: Build Linux Server Bundle

on:
  push:
    paths:
      - "packages/highlight/**"
      - "packages/relay/**"
      - "packages/protocol/**"
      - "packages/client/**"
      - "packages/server/**"
      - "packages/cli/**"
      - "scripts/deploy/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-linux-server.yml"
  workflow_dispatch:

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: false

env:
  ONNXRUNTIME_NODE_INSTALL: skip

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server stack
        run: npm run build:server

      - name: Typecheck server stack
        run: npm run typecheck:server

      - name: Pack deploy packages
        run: |
          mkdir -p deploy-bundle/packages
          npm pack --pack-destination deploy-bundle/packages --workspace=@getpaseo/highlight
          npm pack --pack-destination deploy-bundle/packages --workspace=@getpaseo/relay
          npm pack --pack-destination deploy-bundle/packages --workspace=@getpaseo/protocol
          npm pack --pack-destination deploy-bundle/packages --workspace=@getpaseo/client
          npm pack --pack-destination deploy-bundle/packages --workspace=@getpaseo/server
          npm pack --pack-destination deploy-bundle/packages --workspace=@getpaseo/cli
          cp scripts/deploy/install-linux-release.sh deploy-bundle/
          cp scripts/deploy/pull-linux-release.sh deploy-bundle/
          node -e 'const fs = require("fs"); fs.writeFileSync("deploy-bundle/BUILD.json", JSON.stringify({ version: "2.0", packageVersion: require("./packages/server/package.json").version, sha: process.env.GITHUB_SHA, branch: process.env.GITHUB_REF_NAME, builtAt: new Date().toISOString() }, null, 2) + "\n");'
          chmod +x deploy-bundle/install-linux-release.sh deploy-bundle/pull-linux-release.sh

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: paseo-linux-${{ github.sha }}
          path: deploy-bundle
          if-no-files-found: error
          retention-days: 14
