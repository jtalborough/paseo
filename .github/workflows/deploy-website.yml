name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "CHANGELOG.md"
      - "public-docs/**"
      - "packages/website/**"
      - "package.json"
      - "package-lock.json"
      - "patches/**"
      - ".github/workflows/deploy-website.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    if: ${{ github.event_name != 'release' || (!github.event.release.prerelease && !github.event.release.draft) }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=@getpaseo/website --include-workspace-root

      - name: Typecheck
        run: npm run typecheck --workspace=@getpaseo/website

      - name: Deploy to Cloudflare Workers
        run: npm run deploy --workspace=@getpaseo/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
